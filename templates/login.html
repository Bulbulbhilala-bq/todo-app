<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — Doist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #faf7f2;
      --ink:   #1a1612;
      --rust:  #c94e2d;
      --rust-light: #f4e8e3;
      --tan:   #e8e0d4;
      --muted: #7a7168;
      --radius: 12px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    /* ── Left panel ── */
    .left {
      background: var(--ink);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 3rem;
      position: relative;
      overflow: hidden;
    }

    .left::before {
      content: '';
      position: absolute;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201,78,45,.25) 0%, transparent 70%);
      top: -100px; left: -100px;
    }
    .left::after {
      content: '';
      position: absolute;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201,78,45,.15) 0%, transparent 70%);
      bottom: -80px; right: -80px;
    }

    .brand {
      position: relative; z-index: 1;
      display: flex; align-items: center; gap: .75rem;
    }
    .brand-icon {
      width: 40px; height: 40px;
      background: var(--rust);
      border-radius: 10px;
      display: grid; place-items: center;
    }
    .brand-icon svg { width: 22px; height: 22px; }
    .brand-name {
      font-family: 'DM Serif Display', serif;
      font-size: 1.4rem;
      color: var(--cream);
      letter-spacing: -.02em;
    }

    .hero { position: relative; z-index: 1; }
    .hero h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2.2rem, 3.5vw, 3rem);
      color: var(--cream);
      line-height: 1.15;
      margin-bottom: 1.25rem;
    }
    .hero h1 em { color: var(--rust); font-style: italic; }
    .hero p { color: rgba(250,247,242,.55); font-size: .95rem; line-height: 1.7; max-width: 340px; }

    .dots {
      position: relative; z-index: 1;
      display: flex; gap: .5rem;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(250,247,242,.2); }
    .dot.active { background: var(--rust); }

    /* ── Right panel ── */
    .right {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 3rem 2rem;
    }

    .form-card {
      width: 100%;
      max-width: 380px;
    }

    .form-card h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      color: var(--ink);
      margin-bottom: .4rem;
    }
    .form-card .sub {
      color: var(--muted);
      font-size: .9rem;
      margin-bottom: 2.5rem;
    }
    .form-card .sub span {
      background: var(--rust-light);
      color: var(--rust);
      padding: .1rem .4rem;
      border-radius: 4px;
      font-weight: 600;
      font-size: .8rem;
    }

    .field { margin-bottom: 1.2rem; }
    .field label {
      display: block;
      font-size: .8rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .5rem;
    }
    .field input {
      width: 100%;
      padding: .85rem 1rem;
      border: 1.5px solid var(--tan);
      border-radius: var(--radius);
      background: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      color: var(--ink);
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }
    .field input:focus {
      border-color: var(--rust);
      box-shadow: 0 0 0 3px rgba(201,78,45,.1);
    }
    .field input::placeholder { color: #bbb; }

    .error-msg {
      background: var(--rust-light);
      color: var(--rust);
      border-radius: var(--radius);
      padding: .75rem 1rem;
      font-size: .875rem;
      font-weight: 500;
      margin-bottom: 1.2rem;
      display: flex; align-items: center; gap: .5rem;
    }

    .btn-login {
      width: 100%;
      padding: .95rem;
      background: var(--ink);
      color: var(--cream);
      border: none;
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, transform .1s;
      position: relative;
      overflow: hidden;
    }
    .btn-login:hover { background: #2d2822; }
    .btn-login:active { transform: scale(.98); }

    .hint {
      text-align: center;
      margin-top: 1.5rem;
      font-size: .8rem;
      color: var(--muted);
    }
    .hint kbd {
      background: var(--tan);
      color: var(--ink);
      padding: .1rem .35rem;
      border-radius: 4px;
      font-family: monospace;
      font-size: .8rem;
    }

    @media (max-width: 700px) {
      body { grid-template-columns: 1fr; }
      .left { display: none; }
    }
  </style>
</head>
<body>

  <!-- Left -->
  <div class="left">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
          <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
        </svg>
      </div>
      <span class="brand-name">Doist</span>
    </div>

    <div class="hero">
      <h1>Organise your day,<br/><em>effortlessly.</em></h1>
      <p>A calm, focused space for your tasks. Add, prioritize, and check things off — without the clutter.</p>
    </div>

    <div class="dots">
      <div class="dot active"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <!-- Right -->
  <div class="right">
    <div class="form-card">
      <h2>Welcome back</h2>
      <p class="sub">Use <span>demo</span> / <span>demo123</span> to sign in</p>

      {% if error %}
      <div class="error-msg">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        {{ error }}
      </div>
      {% endif %}

      <form method="POST">
        <div class="field">
          <label>Username</label>
          <input type="text" name="username" placeholder="demo" autocomplete="username" required />
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" name="password" placeholder="••••••••" autocomplete="current-password" required />
        </div>
        <button class="btn-login" type="submit">Sign in →</button>
      </form>

<div style="margin-top: 16px; text-align: center;">
  <p style="color: var(--muted); margin-bottom: 12px; font-size: 0.9rem;">— ya —</p>
  <a href="/google-login" style="
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: white;
    border: 2px solid #ddd;
    border-radius: var(--radius);
    padding: 12px 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 500;
    color: #333;
    text-decoration: none;
    transition: all 0.2s;
  "
  onmouseover="this.style.borderColor='#c94e2d'"
  onmouseout="this.style.borderColor='#ddd'"
  >
    <img src="https://www.google.com/favicon.ico" width="20" height="20" alt="G"/>
    Google Login 
  </a>
</div>

<p class="hint">  <!-- line 256 wali line yahan rahegi -->
      <p class="hint">Press <kbd>Enter</kbd> to submit quickly</p>
    </div>
  </div>

</body>
</html>
