<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Doist — My Tasks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #faf7f2;
      --ink:   #1a1612;
      --rust:  #c94e2d;
      --rust-light: #f4e8e3;
      --tan:   #e8e0d4;
      --tan2:  #f0ebe3;
      --muted: #7a7168;
      --green: #2d7a4f;
      --green-light: #e3f4eb;
      --blue-light: #e3edf4;
      --blue: #2d5a7a;
      --radius: 12px;
      --sidebar: 240px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar);
      min-height: 100vh;
      background: var(--ink);
      display: flex;
      flex-direction: column;
      padding: 1.5rem 1rem;
      gap: 2rem;
      position: fixed;
      top: 0; left: 0; bottom: 0;
    }

    .brand {
      display: flex; align-items: center; gap: .6rem;
      padding: .25rem .5rem;
    }
    .brand-icon {
      width: 34px; height: 34px;
      background: var(--rust);
      border-radius: 8px;
      display: grid; place-items: center;
      flex-shrink: 0;
    }
    .brand-icon svg { width: 18px; height: 18px; }
    .brand-name {
      font-family: 'DM Serif Display', serif;
      font-size: 1.2rem;
      color: var(--cream);
    }

    .nav { display: flex; flex-direction: column; gap: .25rem; flex: 1; }
    .nav-item {
      display: flex; align-items: center; gap: .65rem;
      padding: .6rem .75rem;
      border-radius: 8px;
      color: rgba(250,247,242,.5);
      font-size: .875rem;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s, color .15s;
      text-decoration: none;
    }
    .nav-item:hover { background: rgba(250,247,242,.07); color: rgba(250,247,242,.85); }
    .nav-item.active { background: rgba(201,78,45,.2); color: var(--rust); }
    .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }

    .nav-section {
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: rgba(250,247,242,.25);
      padding: 0 .75rem;
      margin-top: .5rem;
      margin-bottom: .15rem;
    }

    .badge {
      margin-left: auto;
      background: rgba(201,78,45,.3);
      color: var(--rust);
      font-size: .7rem;
      font-weight: 700;
      padding: .1rem .45rem;
      border-radius: 20px;
    }

    .user-area {
      border-top: 1px solid rgba(250,247,242,.08);
      padding-top: 1rem;
    }
    .user-row {
      display: flex; align-items: center; gap: .65rem;
      padding: .5rem .75rem;
    }
    .avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: var(--rust);
      color: white;
      display: grid; place-items: center;
      font-size: .8rem; font-weight: 700;
      flex-shrink: 0;
    }
    .user-info { flex: 1; }
    .user-info .name { font-size: .85rem; font-weight: 600; color: var(--cream); }
    .user-info .role { font-size: .7rem; color: var(--muted); }
    .logout-btn {
      color: rgba(250,247,242,.3);
      text-decoration: none;
      font-size: .78rem;
      padding: .4rem .75rem;
      border-radius: 6px;
      display: flex; align-items: center; gap: .4rem;
      transition: color .15s, background .15s;
    }
    .logout-btn:hover { color: var(--rust); background: rgba(201,78,45,.1); }

    /* ── Main ── */
    .main {
      margin-left: var(--sidebar);
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .topbar {
      padding: 1.75rem 2.5rem 0;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
    }

    .page-title h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      color: var(--ink);
      line-height: 1;
    }
    .page-title .date-label {
      font-size: .82rem;
      color: var(--muted);
      margin-top: .3rem;
    }

    /* filter tabs */
    .filters {
      display: flex;
      gap: .4rem;
      background: var(--tan2);
      padding: .3rem;
      border-radius: 10px;
    }
    .filter-btn {
      padding: .4rem .9rem;
      border: none;
      background: transparent;
      border-radius: 7px;
      font-family: 'DM Sans', sans-serif;
      font-size: .82rem;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .filter-btn.active {
      background: white;
      color: var(--ink);
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }

    /* ── Add form ── */
    .add-section {
      padding: 1.5rem 2.5rem;
    }

    .add-card {
      background: white;
      border: 1.5px solid var(--tan);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      display: flex;
      gap: .75rem;
      align-items: center;
      transition: border-color .2s, box-shadow .2s;
    }
    .add-card:focus-within {
      border-color: var(--rust);
      box-shadow: 0 0 0 3px rgba(201,78,45,.08);
    }

    .add-input {
      flex: 1;
      border: none;
      outline: none;
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      color: var(--ink);
      background: transparent;
    }
    .add-input::placeholder { color: #bbb; }

    .priority-select {
      border: 1px solid var(--tan);
      border-radius: 6px;
      padding: .3rem .5rem;
      font-family: 'DM Sans', sans-serif;
      font-size: .78rem;
      color: var(--muted);
      background: transparent;
      outline: none;
      cursor: pointer;
    }

    .add-btn {
      background: var(--ink);
      color: var(--cream);
      border: none;
      border-radius: 8px;
      padding: .5rem 1rem;
      font-family: 'DM Sans', sans-serif;
      font-size: .875rem;
      font-weight: 600;
      cursor: pointer;
      display: flex; align-items: center; gap: .4rem;
      transition: background .15s, transform .1s;
      white-space: nowrap;
    }
    .add-btn:hover { background: #2d2822; }
    .add-btn:active { transform: scale(.97); }

    /* ── Stats ── */
    .stats-row {
      display: flex;
      gap: .75rem;
      padding: 0 2.5rem .5rem;
    }
    .stat-chip {
      display: flex; align-items: center; gap: .4rem;
      padding: .35rem .75rem;
      border-radius: 20px;
      font-size: .78rem;
      font-weight: 600;
    }
    .stat-chip.total { background: var(--tan2); color: var(--ink); }
    .stat-chip.done  { background: var(--green-light); color: var(--green); }
    .stat-chip.pend  { background: var(--rust-light); color: var(--rust); }

    /* ── Todo list ── */
    .list-section {
      flex: 1;
      padding: 0 2.5rem 3rem;
    }

    .todo-list { display: flex; flex-direction: column; gap: .5rem; }

    .todo-item {
      background: white;
      border: 1.5px solid var(--tan);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      gap: .85rem;
      transition: opacity .2s, transform .2s, border-color .15s;
      animation: slideIn .25s ease;
    }
    .todo-item:hover { border-color: #d8d0c4; }
    .todo-item.done-item { opacity: .55; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* checkbox */
    .check-btn {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2px solid var(--tan);
      background: white;
      cursor: pointer;
      display: grid; place-items: center;
      flex-shrink: 0;
      transition: background .15s, border-color .15s;
    }
    .check-btn:hover { border-color: var(--green); }
    .check-btn.checked { background: var(--green); border-color: var(--green); }
    .check-btn svg { width: 12px; height: 12px; stroke: white; display: none; }
    .check-btn.checked svg { display: block; }

    .todo-body { flex: 1; min-width: 0; }

    .todo-text {
      font-size: .95rem;
      font-weight: 500;
      color: var(--ink);
      transition: color .15s;
      word-break: break-word;
    }
    .done-item .todo-text {
      text-decoration: line-through;
      color: var(--muted);
    }
    .todo-meta {
      margin-top: .2rem;
      font-size: .75rem;
      color: var(--muted);
    }

    .priority-badge {
      padding: .2rem .55rem;
      border-radius: 20px;
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .02em;
      flex-shrink: 0;
    }
    .priority-badge.high   { background: var(--rust-light); color: var(--rust); }
    .priority-badge.medium { background: #fef3e2; color: #b45309; }
    .priority-badge.low    { background: var(--blue-light); color: var(--blue); }

    .action-btns { display: flex; gap: .25rem; }
    .action-btn {
      width: 30px; height: 30px;
      border: none; background: transparent;
      border-radius: 7px;
      display: grid; place-items: center;
      cursor: pointer;
      color: var(--muted);
      transition: background .15s, color .15s;
    }
    .action-btn:hover { background: var(--tan2); color: var(--ink); }
    .action-btn.del:hover { background: var(--rust-light); color: var(--rust); }
    .action-btn svg { width: 15px; height: 15px; }

    /* ── Edit modal ── */
    .modal-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(26,22,18,.45);
      backdrop-filter: blur(4px);
      z-index: 100;
      place-items: center;
    }
    .modal-backdrop.open { display: grid; }

    .modal {
      background: var(--cream);
      border-radius: 16px;
      padding: 2rem;
      width: 420px;
      max-width: calc(100vw - 2rem);
      box-shadow: 0 24px 64px rgba(0,0,0,.2);
      animation: popIn .2s ease;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(.95) translateY(8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .modal h3 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.35rem;
      margin-bottom: 1.25rem;
    }
    .modal .field { margin-bottom: 1rem; }
    .modal .field label {
      display: block;
      font-size: .75rem; font-weight: 700;
      letter-spacing: .07em; text-transform: uppercase;
      color: var(--muted); margin-bottom: .4rem;
    }
    .modal .field input,
    .modal .field select {
      width: 100%;
      padding: .75rem .9rem;
      border: 1.5px solid var(--tan);
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem;
      color: var(--ink);
      outline: none;
      transition: border-color .2s;
    }
    .modal .field input:focus,
    .modal .field select:focus { border-color: var(--rust); }
    .modal-actions { display: flex; gap: .5rem; justify-content: flex-end; margin-top: 1.5rem; }
    .btn-cancel, .btn-save {
      padding: .6rem 1.2rem;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: .875rem; font-weight: 600;
      cursor: pointer; border: none;
      transition: background .15s, transform .1s;
    }
    .btn-cancel { background: var(--tan2); color: var(--muted); }
    .btn-cancel:hover { background: var(--tan); }
    .btn-save { background: var(--ink); color: var(--cream); }
    .btn-save:hover { background: #2d2822; }
    .btn-save:active, .btn-cancel:active { transform: scale(.97); }

    /* empty state */
    .empty {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
    }
    .empty svg { width: 48px; height: 48px; margin-bottom: 1rem; opacity: .3; }
    .empty p { font-size: 1rem; }
    .empty small { font-size: .82rem; }

    @media (max-width: 700px) {
      .sidebar { display: none; }
      .main { margin-left: 0; }
      .topbar, .add-section, .list-section, .stats-row { padding-left: 1rem; padding-right: 1rem; }
    }
  </style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
        <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
      </svg>
    </div>
    <span class="brand-name">Doist</span>
  </div>

  <nav class="nav">
    <span class="nav-section">Views</span>
    <a class="nav-item active" href="#">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
      All Tasks
      <span class="badge" id="sidebarCount">0</span>
    </a>
    <a class="nav-item" href="#" onclick="setFilter('pending');return false;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Pending
    </a>
    <a class="nav-item" href="#" onclick="setFilter('done');return false;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
      Completed
    </a>

    <span class="nav-section" style="margin-top:1rem">Priority</span>
    <a class="nav-item" href="#" onclick="setFilter('high');return false;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
      High Priority
    </a>
  </nav>

  <div class="user-area">
    <div class="user-row">
      <div class="avatar">{{ username[0].upper() }}</div>
      <div class="user-info">
        <div class="name">{{ username }}</div>
        <div class="role">Demo account</div>
      </div>
    </div>
    <a href="/logout" class="logout-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Sign out
    </a>
  </div>
</aside>

<!-- Main -->
<main class="main">
  <div class="topbar">
    <div class="page-title">
      <h1>My Tasks</h1>
      <div class="date-label" id="dateLabel"></div>
    </div>
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all')">All</button>
      <button class="filter-btn" onclick="setFilter('pending')">Pending</button>
      <button class="filter-btn" onclick="setFilter('done')">Done</button>
      <button class="filter-btn" onclick="setFilter('high')">🔴 High</button>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-chip total">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      <span id="statTotal">0 tasks</span>
    </div>
    <div class="stat-chip done">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      <span id="statDone">0 done</span>
    </div>
    <div class="stat-chip pend">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span id="statPend">0 pending</span>
    </div>
  </div>

  <div class="add-section">
    <div class="add-card">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      <input class="add-input" id="addInput" type="text" placeholder="Add a new task… (press Enter)" />
      <select class="priority-select" id="addPriority">
        <option value="medium">⚡ Medium</option>
        <option value="high">🔴 High</option>
        <option value="low">🔵 Low</option>
      </select>
      <button class="add-btn" onclick="addTodo()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Task
      </button>
    </div>
  </div>

  <div class="list-section">
    <div class="todo-list" id="todoList"></div>
    <div class="empty" id="emptyState" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M9 12l2 2 4-4"/></svg>
      <p>Nothing here yet</p>
      <small>Add a task above to get started</small>
    </div>
  </div>
</main>

<!-- Edit Modal -->
<div class="modal-backdrop" id="editModal" onclick="closeModal(event)">
  <div class="modal">
    <h3>Edit Task</h3>
    <div class="field">
      <label>Task</label>
      <input type="text" id="editText" placeholder="Task description" />
    </div>
    <div class="field">
      <label>Priority</label>
      <select id="editPriority">
        <option value="high">🔴 High</option>
        <option value="medium">⚡ Medium</option>
        <option value="low">🔵 Low</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<script>
let todos = [];
let filter = 'all';
let editingId = null;

// Seed date label
const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const now = new Date();
document.getElementById('dateLabel').textContent =
  `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()} ${now.getFullYear()}`;

// ── API helpers ──────────────────────────────────────────────
async function fetchTodos() {
  const r = await fetch('/api/todos');
  todos = await r.json();
  render();
}

async function addTodo() {
  const text = document.getElementById('addInput').value.trim();
  if (!text) { document.getElementById('addInput').focus(); return; }
  const priority = document.getElementById('addPriority').value;
  const r = await fetch('/api/todos', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({text, priority})
  });
  const t = await r.json();
  todos.unshift(t);
  document.getElementById('addInput').value = '';
  render();
}

async function toggleTodo(id) {
  const t = todos.find(x => x.id === id);
  const r = await fetch(`/api/todos/${id}`, {
    method: 'PUT',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({done: !t.done})
  });
  const updated = await r.json();
  todos = todos.map(x => x.id === id ? updated : x);
  render();
}

async function deleteTodo(id) {
  await fetch(`/api/todos/${id}`, {method: 'DELETE'});
  todos = todos.filter(x => x.id !== id);
  render();
}

async function saveEdit() {
  const text = document.getElementById('editText').value.trim();
  const priority = document.getElementById('editPriority').value;
  if (!text) return;
  const r = await fetch(`/api/todos/${editingId}`, {
    method: 'PUT',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({text, priority})
  });
  const updated = await r.json();
  todos = todos.map(x => x.id === editingId ? updated : x);
  closeModal();
  render();
}

// ── Filter ───────────────────────────────────────────────────
function setFilter(f) {
  filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  const idx = {all:0,pending:1,done:2,high:3};
  document.querySelectorAll('.filter-btn')[idx[f] ?? 0].classList.add('active');
  render();
}

function filtered() {
  if (filter === 'pending') return todos.filter(t => !t.done);
  if (filter === 'done')    return todos.filter(t => t.done);
  if (filter === 'high')    return todos.filter(t => t.priority === 'high');
  return todos;
}

// ── Render ───────────────────────────────────────────────────
function render() {
  const list = document.getElementById('todoList');
  const empty = document.getElementById('emptyState');
  const shown = filtered();

  // stats
  const done = todos.filter(t => t.done).length;
  document.getElementById('statTotal').textContent = `${todos.length} task${todos.length !== 1 ? 's' : ''}`;
  document.getElementById('statDone').textContent  = `${done} done`;
  document.getElementById('statPend').textContent  = `${todos.length - done} pending`;
  document.getElementById('sidebarCount').textContent = todos.filter(t => !t.done).length;

  if (!shown.length) {
    list.innerHTML = '';
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';

  list.innerHTML = shown.map(t => `
    <div class="todo-item ${t.done ? 'done-item' : ''}" id="item-${t.id}">
      <button class="check-btn ${t.done ? 'checked' : ''}" onclick="toggleTodo(${t.id})" title="${t.done ? 'Undo' : 'Complete'}">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </button>
      <div class="todo-body">
        <div class="todo-text">${escHtml(t.text)}</div>
        <div class="todo-meta">Added ${t.created_at}</div>
      </div>
      <span class="priority-badge ${t.priority}">${t.priority}</span>
      <div class="action-btns">
        <button class="action-btn" onclick="openEdit(${t.id})" title="Edit">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="action-btn del" onclick="deleteTodo(${t.id})" title="Delete">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </div>
    </div>
  `).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Modal ────────────────────────────────────────────────────
function openEdit(id) {
  const t = todos.find(x => x.id === id);
  editingId = id;
  document.getElementById('editText').value = t.text;
  document.getElementById('editPriority').value = t.priority;
  document.getElementById('editModal').classList.add('open');
  setTimeout(() => document.getElementById('editText').focus(), 50);
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('editModal')) return;
  document.getElementById('editModal').classList.remove('open');
  editingId = null;
}

// ── Keyboard shortcuts ───────────────────────────────────────
document.getElementById('addInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTodo();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// Init
fetchTodos();
</script>
</body>
</html>
